services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unitime
      POSTGRES_PASSWORD: unitime
      POSTGRES_DB: unitime
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unitime"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: .
    env_file: .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

  worker:
    build: .
    env_file: .env
    command: celery -A unitime worker -l info
    volumes: [".:/app"]
    depends_on:
      - api
      - redis

  beat:
    build: .
    env_file: .env
    command: celery -A unitime beat -l info
    volumes: [".:/app"]
    depends_on:
      - api
      - redis

volumes:
  pgdata:
